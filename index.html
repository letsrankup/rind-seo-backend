<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIND Enterprise - Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }
        .glass-panel { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-100">

    <div class="w-full max-w-md glass-panel rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-emerald-500/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-blue-500/20 rounded-full blur-3xl"></div>

        <div class="text-center mb-8 relative">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-600 mb-3 shadow-lg shadow-emerald-500/20">
                <i class="fa-solid fa-shield-halved text-2xl text-slate-900"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">RIND ENTERPRISE</h1>
            <p class="text-xs text-slate-400 mt-1">Next-Gen Decentralized Identity Verification</p>
        </div>

        <div class="flex p-1 bg-slate-950/60 rounded-xl mb-6 border border-slate-800/50">
            <button class="w-1/2 py-2.5 text-sm font-medium rounded-lg bg-emerald-500 text-slate-950 shadow-sm transition-all">Sign Up</button>
            <button class="w-1/2 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:text-slate-200 transition-all">Log In</button>
        </div>

        <form class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Global Phone Authentication</label>
                <div class="flex rounded-xl bg-slate-950/80 border border-slate-800 focus-within:border-emerald-500/50 overflow-hidden transition-all">
                    <select class="bg-transparent text-sm text-slate-300 px-3 border-r border-slate-800 outline-none cursor-pointer font-mono">
                        <option value="+92" class="bg-slate-900">🇵🇰 +92</option>
                        <option value="+1" class="bg-slate-900">🇺🇸 +1</option>
                        <option value="+44" class="bg-slate-900">🇬🇧 +44</option>
                        <option value="+971" class="bg-slate-900">🇦🇪 +971</option>
                        <option value="+91" class="bg-slate-900">🇮🇳 +91</option>
                        <option value="+234" class="bg-slate-900">🇳🇬 +234</option>
                    </select>
                    <input type="tel" placeholder="3001234567" class="w-full bg-transparent px-4 py-3 text-sm font-mono text-white placeholder-slate-600 outline-none">
                </div>
            </div>

            <div class="space-y-3">
                <div class="relative flex items-center bg-slate-950/80 border border-slate-800 rounded-xl focus-within:border-emerald-500/50 transition-all">
                    <i class="fa-regular fa-envelope absolute left-4 text-slate-500 text-sm"></i>
                    <input type="email" placeholder="Corporate Email Address" class="w-full bg-transparent pl-11 pr-4 py-3 text-sm text-white placeholder-slate-600 outline-none">
                </div>
                <div class="relative flex items-center bg-slate-950/80 border border-slate-800 rounded-xl focus-within:border-emerald-500/50 transition-all">
                    <i class="fa-solid fa-lock absolute left-4 text-slate-500 text-sm"></i>
                    <input type="password" placeholder="Secure Anchor Password" class="w-full bg-transparent pl-11 pr-12 py-3 text-sm text-white placeholder-slate-600 outline-none">
                    <i class="fa-regular fa-eye-slash absolute right-4 text-slate-500 text-sm cursor-pointer hover:text-slate-300"></i>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-slate-950 font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/10 hover:opacity-95 active:scale-[0.99] transition-all text-sm uppercase tracking-wider mt-2">
                Initialize Secure Registration
            </button>
        </form>

        <div class="relative my-6 text-center">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800/80"></div></div>
            <span class="relative px-3 bg-[#0a0f1d] text-xs font-bold text-slate-500 uppercase tracking-widest">Enterprise OAuth SSO</span>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <button class="flex items-center justify-center py-3 rounded-xl bg-slate-950/40 border border-slate-800/80 hover:bg-slate-950 hover:border-slate-700 transition-all group">
                <i class="fa-brands fa-google text-slate-400 group-hover:text-red-400 text-lg transition-colors"></i>
            </button>
            <button class="flex items-center justify-center py-3 rounded-xl bg-slate-950/40 border border-slate-800/80 hover:bg-slate-950 hover:border-slate-700 transition-all group">
                <i class="fa-brands fa-facebook-f text-slate-400 group-hover:text-blue-500 text-lg transition-colors"></i>
            </button>
            <button class="flex items-center justify-center py-3 rounded-xl bg-slate-950/40 border border-slate-800/80 hover:bg-slate-950 hover:border-slate-700 transition-all group">
                <i class="fa-brands fa-x-twitter text-slate-400 group-hover:text-white text-lg transition-colors"></i>
            </button>
        </div>

        <p class="text-center text-[11px] text-slate-500 mt-6 leading-relaxed">
            By accessing this protocol, you deploy an authenticated session subject to our encryption keys & system terms.
        </p>
    </div>

</body>
</html>
